global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "gallifrey-ml-api"
    static_configs:
      - targets: ["ml-api:8000"]
    metrics_path: /metrics

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
